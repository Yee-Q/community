<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body >

<!-- 注册窗口 -->
<div id="register" class="modal fade" tabindex="-1" th:fragment="regist">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-body">
                <button class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-title">
                <h1 class="text-center">注册</h1>
            </div>
            <div class="modal-body">
                <form class="form-group" action="">
                    <div class="form-group">
                        <label>用户名</label>
                        <input class="form-control" type="text" placeholder="6-15位字母或数字">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input class="form-control" type="password" placeholder="至少6位字母或数字">
                    </div>
                    <div class="form-group">
                        <label>再次输入密码</label>
                        <input class="form-control" type="password" placeholder="至少6位字母或数字">
                    </div>
                    <div class="text-right">
                        <button class="btn btn-primary" type="submit">提交</button>
                        <button class="btn btn-danger" data-dismiss="modal">取消</button>
                    </div>
                    <a href="" data-toggle="modal" data-dismiss="modal" data-target="#login">已有账号？点我登录</a>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 登录窗口 -->
<div id="signin" class="modal fade" th:fragment="signin">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-body">
                <button class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-title">
                <h1 class="text-center">登录</h1>
            </div>
            <div class="modal-body">
                <form class="form-group" onsubmit="return false" id="formAsync">
                    <div class="form-group">
                        <label for="inputUserName">用户名</label>
                        <input class="form-control" type="text" placeholder="请输入用户名" id="inputUserName" name="userName">
                        <span id="usernameErrorMsg" style="color: red"></span>
                    </div>
                    <div class="form-group">
                        <label for="inputPassword">密码</label>
                        <input class="form-control" type="password" id="inputPassword" name="password" placeholder="请输入密码">
                        <span id="passwordErrorMsg" style="color: red"></span>
                    </div>
                    <div class="text-right">
                        <button class="btn btn-primary" type="submit" onclick="signin()">登录</button>
                        <button class="btn btn-danger" data-dismiss="modal">取消</button>
                    </div>
                    <a href="" data-toggle="modal" data-dismiss="modal" data-target="#register">还没有账号？点我注册</a>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
