<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body >

<!-- 注册窗口 -->
<div id="register" class="modal fade" tabindex="-1" th:fragment="regist">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-body">
                <button class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-title">
                <h1 class="text-center">注册</h1>
            </div>
            <div class="modal-body">
                <form class="form-group" onsubmit="return false" id="registFormAsync">
                    <div class="form-group">
                        <label for="inputRegistUserName">用户名</label>
                        <input class="form-control" id="inputRegistUserName" type="text" placeholder="3-7位字母或数字" />
                        <span id="usernameRegisterErrorMsg" style="color: red"></span>
                    </div>
                    <div class="form-group">
                        <label for="inputRegistPassword">密码</label>
                        <input class="form-control" id="inputRegistPassword" type="password" placeholder="3-9位字母或数字" />
                        <span id="passwordRegisterErrorMsg" style="color: red"></span>
                    </div>
                    <div class="form-group">
                        <label for="loadHeadPortrait">头像</label>
                        <input type="file" id="loadHeadPortrait" />
                        <span id="fileRegisterErrorMsg" style="color: red"></span>
                    </div>
                    <div class="text-right">
                        <button class="btn btn-primary" type="submit" onclick="register()">提交</button>
                        <button class="btn btn-danger" data-dismiss="modal">取消</button>
                    </div>
                    <a href="" data-toggle="modal" data-dismiss="modal" data-target="#login">已有账号？点我登录</a>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 登录窗口 -->
<div id="signin" class="modal fade" th:fragment="signin">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-body">
                <button class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-title">
                <h1 class="text-center">登录</h1>
            </div>
            <div class="modal-body">
                <form class="form-group" onsubmit="return false" id="signinFormAsync">
                    <div class="form-group">
                        <label for="inputSigninUserName">用户名</label>
                        <input class="form-control" type="text" placeholder="请输入用户名" id="inputSigninUserName" name="userName">
                        <span id="usernameSigninErrorMsg" style="color: red"></span>
                    </div>
                    <div class="form-group">
                        <label for="inputSigninPassword">密码</label>
                        <input class="form-control" type="password" id="inputSigninPassword" name="password" placeholder="请输入密码">
                        <span id="passwordSigninErrorMsg" style="color: red"></span>
                    </div>
                    <div class="text-right">
                        <button class="btn btn-primary" type="submit" onclick="signin()">登录</button>
                        <button class="btn btn-danger" data-dismiss="modal">取消</button>
                    </div>
                    <a href="" data-toggle="modal" data-dismiss="modal" data-target="#register">还没有账号？点我注册</a>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
